name: Release

# Build installers and publish a GitHub Release whenever a version tag is pushed.
# Cut a release with:  git tag v0.1.0 && git push origin v0.1.0
# (workflow_dispatch lets you build artifacts manually without publishing.)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create the Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle app (electron-vite)
        run: npm run build

      # electron-builder rebuilds better-sqlite3 for Electron and produces the
      # installer for the host OS (.dmg on macOS, .exe on Windows). --publish
      # never: the dedicated release job below does the publishing.
      - name: Package installer (electron-builder)
        run: npx electron-builder --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish for real tag pushes; manual runs just produce artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
