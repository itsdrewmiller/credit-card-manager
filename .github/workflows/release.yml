name: Release

# Build installers and publish a GitHub Release whenever a version tag is pushed.
# Cut a release with:  git tag v0.1.0 && git push origin v0.1.0
# (workflow_dispatch lets you build artifacts manually without publishing.)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create the Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Must run before packaging: electron-builder rebuilds better-sqlite3
      # in place for the Electron ABI, after which node-run tests would fail.
      - name: Test
        run: npm test

      - name: Bundle app (electron-vite)
        run: npm run build

      # electron-builder rebuilds better-sqlite3 for Electron and produces the
      # installer for the host OS. Signing + notarization activate automatically
      # when the secrets below are set; otherwise macOS falls back to an ad-hoc
      # signature (see electron-builder.config.cjs + build/afterPack.cjs).
      # --publish never: the dedicated release job below does the publishing.
      - name: Package macOS installer
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --config electron-builder.config.cjs --publish never

      - name: Package Windows installer
        if: matrix.os == 'windows-latest'
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --config electron-builder.config.cjs --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish for real tag pushes; manual runs just produce artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
