name: iOS TestFlight

# Build the Capacitor iOS app with the runner's GA Xcode (local machines may
# be on beta toolchains, which App Store Connect rejects) and upload to
# TestFlight via App Store Connect API-key cloud signing.
#
# Trigger manually (workflow_dispatch) or push an ios-v* tag.
on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:

jobs:
  testflight:
    name: Archive and upload
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Install App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # Build number must be unique per upload; the run number does that.
      # Marketing version tracks package.json.
      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM=B676HVHBWG \
            CODE_SIGN_STYLE=Automatic \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
